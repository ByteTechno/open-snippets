{% extends "base.html" %}

{% block title %}Add Snippet - OpenSnippets{% endblock %}

{% block content %}

<div class="card form-card">
    <h2 class="page-title">Add Code Snippet</h2>
    <p class="page-subtitle">Save or share code snippets that you find valuable.</p>

    <form method="POST">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" required>
        </div>

        <div class="form-group">
            <label for="content">Code Content</label>
            <textarea id="content" name="content" required></textarea>
        </div>

        <button type="submit">Submit Snippet</button>
    </form>
</div>

{% endblock %}
